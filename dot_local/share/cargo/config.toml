[unstable]
codegen-backend = true

[profile]
incremental = true

[profile.dev]
codegen-backend = "cranelift"
debug = "line-tables-only"

[profile.dev.package."*"]
codegen-backend = "llvm"

[profile.test.package."*"]
codegen-backend = "llvm"

[profile.release]
codegen-backend = "llvm"

[profile.web]
codegen-backend = "llvm"

[profile.web-release]
codegen-backend = "llvm"

[build]
# Using a global target dir allows all projects to share incremental compilation results,
# vastly speeding up cold-compilation of new projects.
target-dir = "/home/mirsella/.cache/cargo/global-target"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
  # "-Clink-arg=-fuse-ld=lld",
  # "-Clink-arg=-fuse-ld=mold",
  "-Clink-arg=--ld-path=wild",
  # Nightly
  "-Zshare-generics=y",
  "-Zthreads=8",
]
rustdocflags = [
  "-Zshare-generics=y",
  "-Zthreads=8",
]


[target.wasm32-unknown-unknown]
rustflags = [
  "--cfg=web_sys_unstable_apis",
  # Nightly
  "-Zshare-generics=y",
  "-Zthreads=8",
]
rustdocflags = [
  "-Zshare-generics=y",
  "-Zthreads=8",
]

[package.metadata.bevy_cli.web]
wasm-opt = [
  "-Oz",
  "--enable-threads",
  "--enable-bulk-memory",
  "--enable-nontrapping-float-to-int",
  "--enable-mutable-globals",
]
