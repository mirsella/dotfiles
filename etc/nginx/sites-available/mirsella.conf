server {
	listen 80 default_server;
  listen 9000;
	server_name mirsella.mooo.com;
  location / { return 301 https://$host$request_uri; }
	location /http {
		root /hdd/www/html/mirsella.mooo.com;
		index index.html;
    }
  location /box { proxy_pass http://127.0.0.1:9001/;}
  location /js { proxy_pass http://127.0.0.1:9001/js;}
}
    
server {
  listen 443 ssl default_server;
  server_name mirsella.mooo.com;
	include sites-enabled/ssl.conf;
	location / {
		root /hdd/www/html/mirsella.mooo.com;
		index index.html;
	}
}

server {
listen 9001;
location / { proxy_pass http://192.168.1.1/; }
location /js { proxy_pass http://192.168.1.1/js; }
}
